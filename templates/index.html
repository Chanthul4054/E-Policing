<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Hotspot Allocation Scores</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f4f4f4;
            text-align: left;
        }
    </style>
</head>

<body>
    <h1>Hotspot Model Predictions</h1>

    {% if rows %}
    <table>
        <thead>
            <tr>
                {% for c in cols %}
                <th>{{ c }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for r in rows %}
            <tr>
                {% for c in cols %}
                <td>{{ r[c] }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No rows to display.</p>
    {% endif %}
</body>

</html>
