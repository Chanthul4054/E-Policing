<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .box {
            width: 360px;
            margin: 80px auto;
            padding: 18px;
            border: 1px solid #ddd;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
        }

        .err {
            color: #b00020;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Login</h2>
        {% if error %}<p class="err">{{ error }}</p>{% endif %}
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>

</html>
